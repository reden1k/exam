{% extends 'base/base.html' %}

{% block title %}Удаление заказа{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-trash"></i> Удаление заказа</h4>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить заказ <strong>{{ order.order_number }}</strong>?</p>
                <p class="text-muted">Это действие нельзя отменить.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Удалить
                        </button>
                        <a href="{% url 'orders:order_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
